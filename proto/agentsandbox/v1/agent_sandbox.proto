syntax = "proto3";

package agentsandbox.v1;

option go_package = "github.com/solarhell/agent-sandbox/sdk/go/proto/agentsandbox/v1;agentsandboxv1";

service AgentSandboxService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc BindWorkspace(BindWorkspaceRequest) returns (BindWorkspaceResponse);
  rpc Run(RunRequest) returns (RunResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse);
  rpc GetOperation(GetOperationRequest) returns (GetOperationResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
}

message CreateWorkspaceRequest {
  string workspace_id = 1;
}

message CreateWorkspaceResponse {
  Workspace workspace = 1;
}

message Workspace {
  string workspace_id = 1;
  string worktree_path = 2;
  string tree_hash = 3;
  WorkspaceKind kind = 4;
}

enum WorkspaceKind {
  WORKSPACE_KIND_UNSPECIFIED = 0;
  WORKSPACE_KIND_MANAGED = 1;
  WORKSPACE_KIND_LOCAL_BOUND = 2;
}

message BindWorkspaceRequest {
  string workspace_id = 1;
  WorkspaceBinding binding = 2;
}

message WorkspaceBinding {
  oneof source {
    LocalWorkspaceBinding local = 1;
  }
}

message LocalWorkspaceBinding {
  string path = 1;
  bool create_if_missing = 2;
}

message BindWorkspaceResponse {
  Workspace workspace = 1;
}

message RunRequest {
  string workspace_id = 1;
  string command = 2;
  string cwd = 3;
  map<string, string> env = 4;
  repeated string exposed_binaries = 5;
  uint64 timeout_ms = 6;
  PolicyMode policy_mode = 7;
  // Per-stream output caps in bytes. 0 means the daemon default.
  // The daemon truncates output server-side and sets the truncated flags,
  // so responses never exceed gRPC message limits.
  uint64 max_stdout_bytes = 8;
  uint64 max_stderr_bytes = 9;
  // Skip before/after tree hashing for this run. The operation log entry is
  // still written, with empty tree hashes and changed=false. Use this when
  // the caller does not consume tree hashes and the workspace is large.
  bool skip_tree_hash = 10;
}

enum PolicyMode {
  POLICY_MODE_UNSPECIFIED = 0;
  POLICY_MODE_READ_WRITE = 1;
  POLICY_MODE_READ_ONLY = 2;
}

message RunResponse {
  uint64 exit_code = 1;
  bytes stdout = 2;
  bytes stderr = 3;
  string runner = 4;
  string op_id = 5;
  string before_tree_hash = 6;
  string after_tree_hash = 7;
  bool changed = 8;
  RunAudit audit = 9;
  // Output was truncated server-side to the requested/default cap.
  bool stdout_truncated = 10;
  bool stderr_truncated = 11;
  // The command hit its timeout and was killed. stdout/stderr hold the
  // output produced before the kill; exit_code is 124.
  bool timed_out = 12;
}

message RunAudit {
  string request_id = 1;
  string workspace_id = 2;
  string cwd = 3;
  repeated string exposed_binaries = 4;
  uint64 timeout_ms = 5;
  uint64 duration_ms = 6;
  string runner = 7;
  uint64 started_at_unix_ms = 8;
  uint64 finished_at_unix_ms = 9;
  uint64 stdout_bytes = 10;
  uint64 stderr_bytes = 11;
  PolicyMode policy_mode = 12;
  bool timed_out = 13;
}

message StatusRequest {
  string workspace_id = 1;
}

message StatusResponse {
  Workspace workspace = 1;
  string runner = 2;
}

message Operation {
  string op_id = 1;
  string command = 2;
  uint64 exit_code = 3;
  string before_tree_hash = 4;
  string after_tree_hash = 5;
  bool changed = 6;
  RunAudit audit = 7;
}

message ListOperationsRequest {
  string workspace_id = 1;
  uint64 page_size = 2;
  string page_token = 3;
}

message ListOperationsResponse {
  repeated Operation operations = 1;
  string next_page_token = 2;
}

message GetOperationRequest {
  string workspace_id = 1;
  string op_id = 2;
}

message GetOperationResponse {
  Operation operation = 1;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {
  // False when the workspace did not exist; the call still succeeds.
  bool deleted = 1;
}
