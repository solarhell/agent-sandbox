name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Rust and Go SDK integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap protobuf-compiler ripgrep
          bwrap --version
          protoc --version
          rg --version

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum

      - name: Proto generated code check
        run: make proto-check

      - name: Rust tests
        run: make test-rust

      - name: Go SDK integration tests
        run: make test-go
