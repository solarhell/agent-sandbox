name: Build Binary

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload assets to"
        required: true
        default: "0.0.1"
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64 binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary
        run: |
          mkdir -p dist
          install -m 0755 target/release/agent-sandbox dist/agent-sandbox-linux-x86_64
          ls -lh dist/agent-sandbox-linux-x86_64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: agent-sandbox-linux-x86_64
          path: dist/agent-sandbox-linux-x86_64
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "agent-sandbox $TAG_NAME"
          gh release upload "$TAG_NAME" \
            dist/agent-sandbox-linux-x86_64 \
            --clobber
